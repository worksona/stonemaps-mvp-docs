
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stonemaps — Welcome</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Jost:wght@200;300;400;500&family=Source+Sans+3:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap');

  :root{
    --map-ground:#3c1912;--map-line:#a9803f;--gold:#d9a441;
    --cream:#f1e9da;--panel:#2a2019;--ink:#181410;--rule:rgba(241,233,218,.18);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:#0d0d0d;font-family:'Source Sans 3','Segoe UI','Helvetica Neue',Arial,sans-serif;}

  .frame{
    width:390px;min-height:844px;margin:24px auto;
    border:7px solid #0a0a0a;border-radius:34px;overflow:hidden;position:relative;
    background:
      radial-gradient(circle at 20% 15%, rgba(241,233,218,.10), transparent 22%),
      radial-gradient(circle at 80% 60%, rgba(241,233,218,.08), transparent 20%),
      repeating-linear-gradient(65deg, transparent 0 18px, rgba(169,128,63,.14) 18px 20px),
      repeating-linear-gradient(-25deg, transparent 0 26px, rgba(169,128,63,.10) 26px 28px),
      var(--map-ground);
    color:var(--cream);display:flex;flex-direction:column;
  }

  .screen{flex:1;display:flex;flex-direction:column;padding:30px 26px 18px;}

  h1{
    font-family:'Jost',sans-serif;font-weight:300;font-size:26px;letter-spacing:.01em;
    color:var(--gold);text-transform:uppercase;margin-bottom:6px;text-align:center;
  }
  .eyebrow{
    font-family:'Jost',sans-serif;font-weight:200;font-size:14px;letter-spacing:.1em;
    text-transform:uppercase;color:var(--cream);opacity:.85;margin-bottom:20px;text-align:center;
  }

  .giftbox{
    background:var(--panel);border-radius:16px;padding:16px;margin-bottom:22px;
    position:relative;flex-shrink:0;
  }
  .giftbox .expand{position:absolute;top:14px;right:14px;width:16px;height:16px;filter:invert(1);opacity:.7;}
  .giftbox.image .frame-img{
    width:100%;aspect-ratio:1/1;border-radius:50%;overflow:hidden;
    display:block;margin:0 auto;border:8px solid #d8d3c9;
  }
  .giftbox.image .frame-img img{width:100%;height:100%;object-fit:cover;display:block;}
  .giftbox.text{min-height:260px;padding:26px 22px;}
  .giftbox.text p{
    font-size:22px;line-height:1.5;font-style:italic;color:#f0e6c8;margin-bottom:20px;
  }

  .standing{margin-top:auto;}
  .standing p{
    font-size:18px;font-weight:300;line-height:1.5;text-align:center;color:var(--cream);margin-bottom:16px;
  }
  .standing p a{color:var(--cream);text-decoration:underline;}
  .standing p.small{font-size:15px;font-weight:300;font-style:italic;opacity:.70;}

  .navbar{position:relative;width:calc(100% - 44px);height:53px;margin:0 22px 20px;}
  .navbar img.base{position:absolute;top:0;left:0;width:100%;height:100%;}
  .navbar .navicon{position:absolute;top:9px;width:35px;height:35px;z-index:2;}
  .navbar .navicon.left{left:9px;}
  .navbar .navicon.right{right:9px;}
  .navbar .center{position:absolute;left:50px;right:50px;top:9px;height:35px;}
  .pill{
    width:100%;height:24.5px;border-radius:999px;cursor:pointer;margin:0;padding:0;border:none;
    display:flex;align-items:center;justify-content:center;
    font-family:'Jost',sans-serif;font-weight:500;font-size:13px;
    letter-spacing:.04em;text-transform:uppercase;color:#181410;text-decoration:none;
  }
  .pill.resting{background:linear-gradient(180deg,#e3e3e3,gray);border:.8px solid #a7a9ac;}
  .pill.active{background:linear-gradient(180deg,#ebda9e,#58575d);border:.8px solid #c4c5c6;}
  .pill.outline{background:none;border:.8px solid #c4c5c6;color:var(--cream);}
  .pill.greyed{background:linear-gradient(180deg,#e3e3e3,gray);border:.8px solid #a7a9ac;opacity:.5;}

  .navbar .tabs{
    position:absolute;left:44px;right:44px;top:9px;height:35px;display:flex;gap:4px;
  }
  .tab{
    flex:1;height:35px;border-radius:999px;display:flex;align-items:center;justify-content:center;
    font-family:'Jost',sans-serif;font-weight:500;font-size:10px;letter-spacing:.01em;
    text-transform:uppercase;text-decoration:none;color:#181410;
  }
  .tab.active{background:linear-gradient(180deg,#ebda9e,#58575d);border:.8px solid #c4c5c6;}
  .tab.resting{background:linear-gradient(180deg,#e3e3e3,gray);border:.8px solid #a7a9ac;}
  .tab.greyed{background:linear-gradient(180deg,#e3e3e3,gray);border:.8px solid #a7a9ac;opacity:.4;}
  .floating{display:flex;justify-content:center;gap:8px;margin:0 22px 10px;}
  .floating .pill{width:auto;padding:0 22px;flex:none;}
</style>
</head>
<body>

<div class="frame">
  <div class="screen">
    <h1>Welcome to Stonemaps</h1>
    <div class="eyebrow">Something from the previous holder:</div>

    <div class="giftbox image">
      <img class="expand" src="assets/card-expand.svg">
      <div class="frame-img">
        <img src="assets/12stones.jpg" alt="Previous holder's gift">
      </div>
    </div>

    <div class="standing">
      <p>Each holder leaves a gift for the next. This is the latest one. You can <a href="#">view all of them</a> here.</p>
      <p class="small">The stone keeps a quiet journal of what it notices. You can opt out on the journal screen.</p>
    </div>
  </div>

  <div class="floating">
    <a class="pill resting" href="3-planetary-emissary.html">Start a Conversation</a>
  </div>

  <div class="navbar">
    <img class="base" src="assets/nav-base.svg">
    <img class="navicon left" src="assets/gift-stone-button-greyed.svg">
    <div class="tabs">
          <span class="tab greyed">Emissary</span>
          <span class="tab greyed">Commons</span>
          <span class="tab greyed">Journal</span>
        </div>
    <a class="navicon right" href="https://stonemaps.org/exec-sum/es-presale.html" target="_blank" rel="noopener"><img src="assets/pre-sale-button-resting.svg" style="width:100%;height:100%"></a>
  </div>
</div>

</body>
</html>
