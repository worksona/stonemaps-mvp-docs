
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stonemaps — PE Conversation</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Jost:wght@200;300;400;500&family=Source+Sans+3:ital,wght@0,300;0,400;0,500;1,300;1,400&display=swap');

  :root{
    --map-ground:#3c1912;--map-line:#a9803f;--gold:#d9a441;
    --cream:#f1e9da;--panel:#2a2019;--ink:#181410;--rule:rgba(241,233,218,.18);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{background:#0d0d0d;font-family:'Source Sans 3','Segoe UI','Helvetica Neue',Arial,sans-serif;}

  .frame{
    width:390px;min-height:844px;margin:24px auto;
    border:7px solid #0a0a0a;border-radius:34px;overflow:hidden;position:relative;
    background:
      radial-gradient(circle at 20% 15%, rgba(241,233,218,.10), transparent 22%),
      radial-gradient(circle at 80% 60%, rgba(241,233,218,.08), transparent 20%),
      repeating-linear-gradient(65deg, transparent 0 18px, rgba(169,128,63,.14) 18px 20px),
      repeating-linear-gradient(-25deg, transparent 0 26px, rgba(169,128,63,.10) 26px 28px),
      var(--map-ground);
    color:var(--cream);display:flex;flex-direction:column;
  }

  .header{padding:24px 26px 14px;display:flex;justify-content:space-between;align-items:flex-start;}
  .header .name{
    font-family:'Jost',sans-serif;font-weight:300;font-size:24px;letter-spacing:.02em;
    color:var(--gold);text-transform:uppercase;
  }
  .header .trait{
    font-size:14px;font-weight:300;font-style:italic;color:var(--cream);opacity:.8;margin-top:2px;
  }
  .header .edit{
    font-family:'Jost',sans-serif;font-weight:300;font-size:12px;letter-spacing:.04em;
    color:var(--cream);opacity:.6;text-decoration:underline;margin-top:6px;display:inline-block;
  }

  .chat{
    flex:1;background:var(--cream);border-radius:24px 24px 0 0;
    margin-top:8px;padding:24px 22px;color:#181410;overflow-y:auto;
  }
  .bubble{font-size:17px;line-height:1.55;margin-bottom:16px;}
  .bubble .who{font-weight:600;}

  .inputbar{
    background:var(--cream);padding:0 22px 18px;
    display:flex;align-items:center;gap:12px;
  }
  .inputbar .field{
    flex:1;background:#e8e2d4;border-radius:22px;padding:12px 18px;
    display:flex;align-items:center;gap:12px;
  }
  .inputbar .field input{
    flex:1;border:none;background:none;outline:none;font-size:16px;color:#333;
    font-family:'Source Sans 3',sans-serif;
  }
  .inputbar .field img.mic{width:21px;height:21px;}
  .inputbar .attach{width:14px;height:14px;opacity:.6;}

  .navbar{position:relative;width:calc(100% - 44px);height:53px;margin:0 22px 20px;}
  .navbar img.base{position:absolute;top:0;left:0;width:100%;height:100%;}
  .navbar .navicon{position:absolute;top:9px;width:35px;height:35px;z-index:2;}
  .navbar .navicon.left{left:9px;}
  .navbar .navicon.right{right:9px;}
  .navbar .center{
    position:absolute;left:50px;right:50px;top:9px;height:35px;
    display:flex;align-items:center;justify-content:center;gap:6px;
  }
  .pill{
    height:24.3px;padding:0 16px;border-radius:999px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;white-space:nowrap;
    font-family:'Jost',sans-serif;font-weight:500;font-size:12px;
    letter-spacing:.03em;text-transform:uppercase;color:#181410;text-decoration:none;
  }
  .pill.resting{background:linear-gradient(180deg,#e3e3e3,gray);border:.8px solid #a7a9ac;}
  .pill.active{background:linear-gradient(180deg,#ebda9e,#58575d);border:.8px solid #c4c5c6;}
  .pill.outline{background:none;border:.8px solid #c4c5c6;color:var(--cream);}
  .pill.greyed{background:linear-gradient(180deg,#e3e3e3,gray);border:.8px solid #a7a9ac;opacity:.5;}

  .navbar .tabs{
    position:absolute;left:44px;right:44px;top:9px;height:35px;display:flex;gap:4px;
  }
  .tab{
    flex:1;height:35px;border-radius:999px;display:flex;align-items:center;justify-content:center;
    font-family:'Jost',sans-serif;font-weight:500;font-size:10px;letter-spacing:.01em;
    text-transform:uppercase;text-decoration:none;color:#181410;
  }
  .tab.active{background:linear-gradient(180deg,#ebda9e,#58575d);border:.8px solid #c4c5c6;}
  .tab.resting{background:linear-gradient(180deg,#e3e3e3,gray);border:.8px solid #a7a9ac;}
  .tab.greyed{background:linear-gradient(180deg,#e3e3e3,gray);border:.8px solid #a7a9ac;opacity:.4;}
  .floating{display:flex;justify-content:center;gap:8px;margin:0 22px 10px;}
  .floating .pill{width:auto;padding:0 22px;flex:none;}
</style>
</head>
<body>

<div class="frame">
  <div class="header">
    <div>
      <div class="name">Pierrot</div>
      <div class="trait">Unhurried. Doesn't push. Has seen worse.</div>
      <a class="edit" href="#">Rename / Edit</a>
    </div>
  </div>

  <div class="chat">
    <div class="bubble">Last person who held me left something about a stone age where even rocks talk back. Felt about right. What brought you here today?</div>
  </div>

  <div class="inputbar">
    <img class="attach" src="assets/chat-attach.svg">
    <div class="field">
      <input placeholder="Reply">
      <img class="mic" src="assets/chat-mic.svg">
    </div>
  </div>

  <div class="floating">
    <a class="pill resting" href="6-pe-journal.html">View PE Journal</a>
  </div>

  <div class="navbar">
    <img class="base" src="assets/nav-base.svg">
    <a class="navicon left" href="7-gift-the-stone.html"><img src="assets/gift-stone-button-resting.svg" style="width:100%;height:100%"></a>
    <div class="tabs">
          <a class="tab active" href="4-pe-conversation.html">Emissary</a>
          <a class="tab resting" href="5-the-commons.html">Commons</a>
          <a class="tab resting" href="6b-journal-entry.html">Journal</a>
        </div>
    <a class="navicon right" href="https://stonemaps.org/exec-sum/es-presale.html" target="_blank" rel="noopener"><img src="assets/pre-sale-button-resting.svg" style="width:100%;height:100%"></a>
  </div>
</div>

</body>
</html>
